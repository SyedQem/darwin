<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="800" fill="#0C0E14"/>
<circle cx="600" cy="200" r="260" fill="#a78bfa" fill-opacity="0.08"/>
<circle cx="200" cy="650" r="220" fill="#7c3aed" fill-opacity="0.06"/>
<!-- Rolled mat (side view) -->
<g transform="translate(160, 260)">
  <!-- Rolled end -->
  <circle cx="120" cy="140" r="80" fill="#1E2130" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="120" cy="140" r="50" fill="#252836"/>
  <circle cx="120" cy="140" r="24" fill="#1A1D28" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <!-- Mat body unrolled -->
  <rect x="120" y="60" width="380" height="160" rx="6" fill="#1E2130" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Surface texture lines -->
  <line x1="180" y1="80" x2="180" y2="200" stroke="rgba(167,139,250,0.06)" stroke-width="1"/>
  <line x1="260" y1="80" x2="260" y2="200" stroke="rgba(167,139,250,0.06)" stroke-width="1"/>
  <line x1="340" y1="80" x2="340" y2="200" stroke="rgba(167,139,250,0.06)" stroke-width="1"/>
  <line x1="420" y1="80" x2="420" y2="200" stroke="rgba(167,139,250,0.06)" stroke-width="1"/>
  <!-- Accent stripe -->
  <rect x="120" y="130" width="380" height="20" rx="2" fill="#a78bfa" fill-opacity="0.12"/>
</g>
<!-- Strap -->
<rect x="300" y="340" width="80" height="8" rx="4" fill="#a78bfa" fill-opacity="0.2"/>
</svg>
